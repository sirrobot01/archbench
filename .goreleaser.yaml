version: 2

project_name: archbench

builds:
  - id: archbench
    main: ./cmd/archbench
    binary: archbench
    env:
      - CGO_ENABLED=0
    targets:
      - darwin_amd64_v1
      - darwin_arm64
      - linux_amd64_v1
      - linux_arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/sirrobot01/archbench/internal/cli.version={{ .Version }}

archives:
  - id: archbench
    ids:
      - archbench
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
      {{- with .Arm }}v{{ . }}{{ end }}
      {{- with .Mips }}_{{ . }}{{ end }}
      {{- with .Amd64 }}{{ if not (eq . "v1") }}_{{ . }}{{ end }}{{ end }}
    files:
      - README.md
      - LICENSE
      - docs/*

homebrew_casks:
  - name: archbench
    ids:
      - archbench
    repository:
      owner: sirrobot01
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/sirrobot01/archbench"
    description: "Cross-architecture benchmark and test orchestration"
    license: "MIT"
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@users.noreply.github.com
    # Only publish the cask for stable releases, never prereleases.
    skip_upload: auto
    # Strip the quarantine xattr so the downloaded binary runs without a
    # Gatekeeper prompt.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr",
              args: ["-dr", "com.apple.quarantine", "#{staged_path}/archbench"]
          end

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: sirrobot01
    name: archbench
  prerelease: auto
